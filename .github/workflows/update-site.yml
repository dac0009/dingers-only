name: Rebuild Dingers Only Site

on:
  # ── Auto: runs once daily at 10 AM ET (14:00 UTC) ──────────────────────────
  # Adjust the cron time if you want a different hour.
  # Cron reference: https://crontab.guru
  schedule:
    - cron: '0 14 * * *'

  # ── Manual: trigger from GitHub → Actions → "Run workflow" button ───────────
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the rebuilt docs/ folder back to main

    steps:
      # 1. Check out the repo (full history so the push works cleanly)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true   # faster binary package installs

      # 3. Install system dependencies Quarto needs
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            pandoc

      # 4. Install Quarto CLI
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 5. Install R packages
      #    renv lockfile is ideal here if you have one; otherwise install directly.
      - name: Install R packages
        run: |
          install.packages(c(
            "tidyverse",
            "reactable",
            "lubridate",
            "htmltools",
            "stringi",
            "readr"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      # 6. Render the Quarto site — outputs into docs/
      - name: Render site
        run: quarto render

      # 7. Commit and push the updated docs/ folder back to main
      #    Only commits if something actually changed (avoids empty commits)
      - name: Commit and push rebuilt site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Check if there are any staged changes before committing
          if git diff --cached --quiet; then
            echo "No changes to docs/ — skipping commit."
          else
            TIMESTAMP=$(TZ="America/New_York" date "+%B %d, %Y at %I:%M %p ET")
            git commit -m "chore: rebuild site — ${TIMESTAMP}"
            git push
          fi
