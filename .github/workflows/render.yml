name: Render & Deploy Dingers Only

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # fast pre-built binaries — much faster installs

      # Reads package list from DESCRIPTION file in repo root
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            reactable
            lubridate
            htmltools
            stringi
            readr

      - name: Render Quarto site
        run: quarto render

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: auto-render site [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
          git commit -m "chore: auto-render site [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
